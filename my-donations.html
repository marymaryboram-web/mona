<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4332">
<title>MONA — 내 기부</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="status-bar">9:41 <span>●●●</span></div>
  <div class="app-header">
    <div class="logo-row"><div class="logo-badge">M</div><span class="logo-text">MONA</span></div>
    <div class="header-icons"><a class="icon-btn" href="notifications.html">🔔</a></div>
  </div>

  <div class="screen">
    <div class="hero-banner">
      <div class="hero-greeting">안녕하세요, 기부 기업님 👋</div>
      <div class="hero-title">오늘도 <em>Less Waste,</em><br>More Impact!</div>
      <a class="hero-cta" href="my-donations-list.html">기부 등록하기 →</a>
    </div>

    <div>
      <div class="section-title" style="margin-bottom:8px;">나의 기부 현황</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon si-y">📦</div><div class="stat-value">1</div><div class="stat-label">전체 건수</div><div class="pill py">진행중 1건</div></div>
        <div class="stat-card"><div class="stat-icon si-g">✅</div><div class="stat-value">0</div><div class="stat-label">완료된 기부</div><div class="pill pg">이번달 0건</div></div>
        <div class="stat-card full">
          <svg width="48" height="48" viewBox="0 0 48 48" style="flex-shrink:0;">
            <circle cx="24" cy="24" r="18" fill="none" stroke="#F0EFE9" stroke-width="5"/>
            <circle cx="24" cy="24" r="18" fill="none" stroke="#F5C800" stroke-width="5" stroke-dasharray="113.1" stroke-dashoffset="84.8" stroke-linecap="round" transform="rotate(-90 24 24)"/>
            <text x="24" y="28" text-anchor="middle" font-size="11" font-weight="800" fill="#1a1a1a">1</text>
          </svg>
          <div style="flex:1;"><div class="stat-label">진행 중인 기부</div><div class="stat-value" style="font-size:17px;">1건</div></div>
          <div style="width:1px;height:32px;background:var(--border);"></div>
          <div style="flex:1;"><div class="stat-label">탄소 감축량</div><div class="stat-value" style="font-size:17px;color:var(--green-mid);">0kg</div><div class="stat-label" style="margin-top:1px;">CO₂e</div></div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title" style="margin-bottom:8px;">빠른 실행</div>
      <div class="quick-grid">
        <a class="qbtn primary" href="my-donations-list.html"><div class="qbtn-icon">🎁</div><div class="qbtn-label">기부 등록</div><div class="qbtn-sub">잉여자원 기부</div></a>
        <a class="qbtn" href="my-donations-list.html"><div class="qbtn-icon">📋</div><div class="qbtn-label">내 기부 목록</div><div class="qbtn-sub">전체보기 →</div></a>
        <a class="qbtn" href="receipts.html"><div class="qbtn-icon">🧾</div><div class="qbtn-label">영수증 조회</div><div class="qbtn-sub">기부금 영수증</div></a>
        <a class="qbtn" href="esg.html"><div class="qbtn-icon">📊</div><div class="qbtn-label">ESG 리포트</div><div class="qbtn-sub">임팩트 데이터</div></a>
      </div>
    </div>

    <div>
      <div class="list-header" style="margin-bottom:8px;">
        <div class="section-title">최근 기부 이력</div>
        <a class="list-more" href="my-donations-list.html">전체보기 →</a>
      </div>
      <a class="d-item" href="donation-detail.html">
        <div class="d-thumb">🥗</div>
        <div class="d-info"><div class="d-name">뷔페 잉여 음식</div><div class="d-meta">2026. 3. 22 · 10kg</div></div>
        <div class="pill py">견적 검토</div>
      </a>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="index.html"><div class="nav-icon-wrap">🏠</div><div class="nav-label">홈</div></a>
    <a class="nav-item active" href="my-donations.html"><div class="nav-icon-wrap">📦</div><div class="nav-label">내 기부</div></a>
    <a class="nav-item" href="chat-list.html"><div class="nav-icon-wrap">💬</div><div class="nav-label">채팅</div></a>
    <a class="nav-item" href="esg.html"><div class="nav-icon-wrap">📊</div><div class="nav-label">리포트</div></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon-wrap">👤</div><div class="nav-label">내 정보</div></a>
  </nav>
</div>
<script src="app.js"></script>
</body>
</html>
