<!DOCTYPE html>

</head>
<body>
<div class="app">

  <div style="padding:8px 18px 10px;display:flex;align-items:center;justify-content:space-between;">

    <button class="icon-btn" style="width:28px;height:28px;border-radius:8px;">✏️</button>

  <div style="margin:0 16px 10px;background:var(--bg);border-radius:var(--radius-sm);padding:0 11px;height:36px;display:flex;align-items:center;gap:7px;flex-shrink:0;">

    <span style="font-size:11px;color:var(--text-hint);">기관명 또는 물품으로 검색</span>

  <div style="flex:1;overflow-y:auto;">
    <a class="feed-item" href="chat-detail.html" style="background:var(--yellow-light);align-items:center;padding:12px 16px;">

        🏫
        <div style="position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:#E24B4A;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:7px;color:white;font-weight:800;">2</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">

          <div style="font-size:9.5px;color:var(--text-hint);">오전 10:23</div>
        </div>
        <div style="font-size:10px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;">냉장 보관 가능하신가요? 픽업 일정 확인 부탁드려요</div>
        <div style="background:var(--green-light);color:var(--green-mid);font-size:8.5px;font-weight:600;padding:1px 7px;border-radius:10px;display:inline-block;">급식용 식품 · 매칭 진행중</div>
      </div>
    </a>

    <a class="feed-item" href="chat-detail.html" style="align-items:center;padding:12px 16px;">
      <div style="width:44px;height:44px;border-radius:13px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🏠</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <div style="font-size:12px;font-weight:700;color:var(--text);">서울 노인복지관</div>
          <div style="font-size:9.5px;color:var(--text-hint);">어제</div>
        </div>
        <div style="font-size:10px;color:var(--text-hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;">감사합니다! 다음 주 화요일 오전에 방문하겠습니다</div>
        <div style="background:#F5F5F3;color:var(--text-hint);font-size:8.5px;font-weight:600;padding:1px 7px;border-radius:10px;display:inline-block;">재고 도서 · 매칭 완료</div>
      </div>
    </a>

    <a class="feed-item" href="chat-detail.html" style="align-items:center;padding:12px 16px;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <div style="font-size:12px;font-weight:700;color:var(--text);">다문화가족지원센터</div>
          <div style="font-size:9.5px;color:var(--text-hint);">3일 전</div>
        </div>
        <div style="font-size:10px;color:var(--text-hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;">네, 확인했습니다. 감사합니다!</div>
        <div style="background:#F5F5F3;color:var(--text-hint);font-size:8.5px;font-weight:600;padding:1px 7px;border-radius:10px;display:inline-block;">시즌 의류 · 기부 완료</div>
      </div>
    </a>

    <div style="padding:20px 16px;text-align:center;font-size:10px;color:var(--text-hint);">최근 3개월 채팅 내역이에요</div>

  <nav class="bottom-nav">

    <a class="nav-item" href="esg.html"><div class="nav-icon-wrap">📊</div><div class="nav-label">리포트</div></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon-wrap">👤</div><div class="nav-label">내 정보</div></a>
  </nav>
