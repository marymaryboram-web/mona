<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4332">
<title>MONA — 신청 완료</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="status-bar">9:41 <span>●●●</span></div>
  <div class="back-hd">
    <a class="back-btn" href="index.html">←</a>
    <div class="back-title">신청 완료</div>
  </div>

  <div class="screen" style="align-items:center;text-align:center;padding-top:20px;gap:14px;">
    <div style="width:68px;height:68px;background:var(--green);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto;">🎉</div>
    <div>
      <div style="font-size:10px;color:var(--text-sub);margin-bottom:5px;">신청이 완료됐어요</div>
      <div style="font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.4;">기업 확인 후<br>매칭 결과를 알려드릴게요</div>
    </div>

    <div style="background:var(--bg);border-radius:var(--radius-md);padding:13px 15px;width:100%;text-align:left;">
      <div style="font-size:9px;color:var(--text-hint);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;">신청 내역</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">신청 품목</span><span style="font-size:11px;font-weight:700;">재고 도서</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">기부 기업</span><span style="font-size:11px;font-weight:700;">한국NVC출판사</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:11px;color:var(--text-sub);">신청 수량</span><span style="font-size:11px;font-weight:700;">2,000권</span></div>
    </div>

    <div style="background:var(--green-light);border-radius:var(--radius-md);padding:12px 14px;width:100%;text-align:left;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--green-accent);"></div>
        <div style="font-size:10px;font-weight:700;color:var(--green-mid);">기업 승인 대기 중</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:17px;height:17px;border-radius:50%;background:var(--green-accent);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white;flex-shrink:0;">✓</div>
          <div style="font-size:10px;color:var(--green-mid);">신청 완료</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:17px;height:17px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--green);flex-shrink:0;">2</div>
          <div style="font-size:10px;font-weight:700;color:var(--green);">기업 담당자 검토 중 — 평균 1~2 영업일</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:17px;height:17px;border-radius:50%;background:#E5E5E5;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--text-hint);flex-shrink:0;">3</div>
          <div style="font-size:10px;color:var(--text-hint);">매칭 확정 → 픽업 일정 안내</div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:7px;width:100%;margin-top:4px;">
      <a class="big-btn btn-yel" href="chat-list.html">💬 담당자와 채팅하기</a>
      <a class="big-btn btn-out" style="height:40px;font-size:11px;" href="index.html">홈으로 돌아가기</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
