<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4332">
<title>MONA — 결제 완료</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="status-bar">9:41 <span>●●●</span></div>
  <div class="back-hd">
    <a class="back-btn" href="index.html">←</a>
    <div class="back-title">결제 완료</div>
  </div>

  <div class="screen" style="align-items:center;text-align:center;padding-top:24px;gap:14px;">
    <div style="width:68px;height:68px;background:var(--green);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto;">✅</div>
    <div>
      <div style="font-size:10px;color:var(--text-sub);margin-bottom:5px;">결제가 완료됐어요</div>
      <div style="font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.3;">픽업이 확정됐어요!</div>
    </div>
    <div style="background:var(--bg);border-radius:var(--radius-md);padding:13px 15px;width:100%;text-align:left;">
      <div style="font-size:9px;color:var(--text-hint);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;">결제 내역</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">결제 금액</span><span style="font-size:11px;font-weight:700;">550,000원</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">픽업 예정일</span><span style="font-size:11px;font-weight:700;">2026. 3. 25</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:11px;color:var(--text-sub);">수혜 기관</span><span style="font-size:11px;font-weight:700;">보라매 아동센터</span></div>
    </div>
    <div style="background:var(--green-light);border-radius:var(--radius-md);padding:11px 14px;width:100%;text-align:left;">
      <div style="font-size:10px;font-weight:700;color:var(--green-mid);margin-bottom:3px;">🌿 다음 단계</div>
      <div style="font-size:10px;color:var(--green-mid);opacity:0.85;line-height:1.6;">픽업 완료 → 기부금 영수증 자동 발행<br>기부 완료 → ESG 임팩트 리포트 생성</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;width:100%;">
      <a class="big-btn btn-yel" href="index.html">홈으로 돌아가기</a>
      <a class="big-btn btn-out" style="height:40px;" href="my-donations-list.html">기부 목록 보기</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
