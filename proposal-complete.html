<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4332">
<title>MONA — 제안 완료</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="status-bar">9:41 <span>●●●</span></div>
  <div class="back-hd">
    <a class="back-btn" href="index.html">←</a>
    <div class="back-title">제안 완료</div>
  </div>

  <div class="screen" style="align-items:center;text-align:center;padding-top:20px;gap:14px;">
    <div style="width:68px;height:68px;background:var(--yellow);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto;">🤝</div>
    <div>
      <div style="font-size:10px;color:var(--text-sub);margin-bottom:5px;">기부 제안이 전달됐어요</div>
      <div style="font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.4;">기관 확인 후<br>매칭 결과를 알려드릴게요</div>
    </div>
    <div style="background:var(--bg);border-radius:var(--radius-md);padding:13px 15px;width:100%;text-align:left;">
      <div style="font-size:9px;color:var(--text-hint);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;">제안 내역</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">수혜기관</span><span style="font-size:11px;font-weight:700;">보라매 아동센터</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:var(--text-sub);">필요 품목</span><span style="font-size:11px;font-weight:700;">급식용 식품</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:11px;color:var(--text-sub);">수혜자</span><span style="font-size:11px;font-weight:700;">50명</span></div>
    </div>
    <div style="background:var(--green-light);border-radius:var(--radius-md);padding:11px 14px;width:100%;text-align:left;">
      <div style="font-size:10px;font-weight:700;color:var(--green-mid);margin-bottom:3px;">🌿 다음 단계</div>
      <div style="font-size:10px;color:var(--green-mid);opacity:0.85;line-height:1.6;">평균 1~2 영업일 내 매칭 결과 알림<br>확정 시 기부 등록으로 자동 연결됩니다</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;width:100%;margin-top:4px;">
      <a class="big-btn btn-yel" href="chat-list.html">💬 담당자와 채팅하기</a>
      <a class="big-btn btn-out" style="height:40px;font-size:11px;" href="index.html">홈으로 돌아가기</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
