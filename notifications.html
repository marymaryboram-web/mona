<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4332">
<title>MONA — 알림</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="status-bar">9:41 <span>●●●</span></div>
  <div style="padding:8px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;">
      <a class="back-btn" href="index.html">←</a>
      <div style="font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.4px;">알림</div>
    </div>
    <button style="font-size:10px;font-weight:600;color:var(--text-hint);background:none;border:none;cursor:pointer;">모두 읽음</button>
  </div>

  <div style="flex:1;overflow-y:auto;">
    <div style="padding:7px 14px;font-size:9px;font-weight:700;color:var(--text-hint);letter-spacing:0.5px;text-transform:uppercase;">오늘</div>

    <a href="application-review.html" style="display:flex;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--yellow-light);text-decoration:none;color:inherit;">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">📬</div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="font-size:11px;font-weight:800;color:var(--text);">새 신청이 들어왔어요</div>
          <div style="font-size:9px;color:var(--text-hint);flex-shrink:0;margin-left:8px;">방금 전</div>
        </div>
        <div style="font-size:10px;color:var(--text-sub);margin-top:2px;line-height:1.5;"><strong>보라매 아동센터</strong>가 <strong>재고 도서 500권</strong>을 신청했어요. 내용을 확인하고 승인 여부를 결정해주세요.</div>
        <div style="margin-top:6px;height:28px;background:var(--yellow);border-radius:6px;display:inline-flex;align-items:center;padding:0 11px;font-size:10px;font-weight:700;color:var(--green);">신청 확인하기 →</div>
      </div>
    </a>

    <div style="display:flex;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--border);">
      <div style="width:38px;height:38px;border-radius:11px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">🤝</div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:11px;font-weight:700;color:var(--text);">매칭 완료</div>
          <div style="font-size:9px;color:var(--text-hint);">1시간 전</div>
        </div>
        <div style="font-size:10px;color:var(--text-sub);margin-top:2px;line-height:1.5;">서울 노인복지관과의 재고 도서 기부 매칭이 완료됐어요.</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--border);">
      <div style="width:38px;height:38px;border-radius:11px;background:#F5F5F3;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">🧾</div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:11px;font-weight:700;color:var(--text);">영수증 발급 완료</div>
          <div style="font-size:9px;color:var(--text-hint);">어제</div>
        </div>
        <div style="font-size:10px;color:var(--text-sub);margin-top:2px;">기부 영수증이 발급됐어요. 세제 혜택에 활용하세요.</div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html"><div class="nav-icon-wrap">🏠</div><div class="nav-label">홈</div></a>
    <a class="nav-item" href="my-donations.html"><div class="nav-icon-wrap">📦</div><div class="nav-label">내 기부</div></a>
    <a class="nav-item" href="chat-list.html"><div class="nav-icon-wrap">💬</div><div class="nav-label">채팅</div></a>
    <a class="nav-item" href="esg.html"><div class="nav-icon-wrap">📊</div><div class="nav-label">리포트</div></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon-wrap">👤</div><div class="nav-label">내 정보</div></a>
  </nav>
</div>
<script src="app.js"></script>
</body>
</html>
